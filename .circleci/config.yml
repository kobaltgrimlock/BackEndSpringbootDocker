version: 2.1
orbs:
  docker: circleci/docker@2.1.1
  heroku: circleci/heroku@2.0.0

jobs:
  build:
    docker:
      - image: cimg/openjdk:17.0
      - image: cimg/postgres:14.0
        environment:
          POSTGRES_USER: ftsolutionadmin
          POSTGRES_DB: ftsolution_db
          POSTGRES_PASSWORD: ftsolution
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Wait for PostgreSQL to be ready
          command: dockerize -wait tcp://localhost:5432 -timeout 1m
      - run:
          name: Build with Maven
          command: ./mvnw clean package -DskipTests

  test:
    docker:
      - image: cimg/openjdk:17.0
    steps:
      - checkout
      - run:
          name: Run Tests
          command: ./mvnw test

  dockerize:
    docker:
      - image: cimg/openjdk:17.0
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build Docker Image
          command: docker build -t khairula86/sctpgrp1dockerassignment:latest .
      - run:
          name: Push Docker Image
          command: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker push khairula86/sctpgrp1dockerassignment:latest

  deploy:
    docker:
      - image: cimg/openjdk:17.0
    steps:
      - setup_remote_docker
      - heroku/install
      - checkout
      - run:
          name: Heroku Container Push
          command: |
            heroku container:login
            heroku stack:set container -a sctpgrp1-dockerassignment
            heroku container:push web -a sctpgrp1-dockerassignment
            heroku container:release web -a sctpgrp1-dockerassignment

workflows:
  version: 2
  ci_flow:
    jobs:
      - build
      - test:
          requires:
            - build
      - dockerize:
          requires:
            - test
      - deploy:
          requires:
            - dockerize
